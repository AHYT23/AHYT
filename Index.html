<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHYT🗣️ - Expression Anonyme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AHYT </h1>
            <p class="subtitle">FAUT CHIER AHYT.</p>
        </header>

        <div class="post-box">
            <label for="category">Choisir une catégorie :</label>
            <select id="category">
                <option value="Vie Campus">🏫 Vie de Campus</option>
                <option value="Cours">📚 Avis sur les cours</option>
                <option value="Confession">🤫 Confession</option>
                <option value="Coup de Gueule">😤 Coup de Gueule</option>
                <option value="Positif">✨ Message Positif</option>
            </select>
            
            <textarea id="postContent" placeholder="Que veux-tu dire ? (Noms de famille et insultes interdits)"></textarea>
            
            <div id="error-msg" class="error" style="display: none;"></div>
            
            <button onclick="publishPost()">Publier sur AHYT</button>
        </div>

        <div id="feed">
            <div class="info-message">Bienvenue sur AHYT. Les messages sont anonymes.</div>
        </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDWzJJoygif_cRpY8bWvEpY6-8I7UGBZu0",
    authDomain: "ahyt-cec31.firebaseapp.com",
    projectId: "ahyt-cec31",
    storageBucket: "ahyt-cec31.firebasestorage.app",
    messagingSenderId: "762298910459",
    appId: "1:762298910459:web:630f7a5e80ec4d86a925e",
    measurementId: "G-CSMWYGFTW6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Ces lignes permettent au fichier script.js d'utiliser Firebase
  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
  window.query = query;
  window.orderBy = orderBy;
  window.onSnapshot = onSnapshot;
  window.serverTimestamp = serverTimestamp;
</script>

<script src="script.js"></script>
</body>
</html>
